name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - id: version_check
        name: Check if version already published
        run: |
          local_version=$(node -p "require('./package.json').version")
          published_version=$(npm view vordbeste version 2>/dev/null || echo "")
          echo "local=$local_version published=$published_version"
          if [ "$local_version" = "$published_version" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Use npx to fetch a recent npm CLI for trusted-publisher OIDC support;
      # Node 22 bundles npm 10.x which can sign provenance but can't auth the
      # upload, producing a 404.
      - if: steps.version_check.outputs.skip == 'false'
        run: npx --yes npm@11 publish --provenance --access public
